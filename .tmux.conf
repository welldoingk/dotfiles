# ~/.tmux.conf - 실용적 기본 설정

# ===== 기본 설정 =====
# Prefix 키: Ctrl-b + Ctrl-a 둘 다 사용 가능
set -g prefix2 C-a
bind C-a send-prefix -2

# 256색 + True Color 지원
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# 히스토리 크기
set -g history-limit 50000

# 인덱스 1부터 시작
set -g base-index 1
setw -g pane-base-index 1

# 창 번호 자동 재정렬
set -g renumber-windows on

# 이스케이프 딜레이 최소화 (vim ESC 반응 + RGB 시퀀스 안정)
set -sg escape-time 30

# ===== 마우스 지원 =====
set -g mouse on

# ===== 클립보드 =====
set -s set-clipboard on

# ===== 마우스 드래그 복사 (내부 클립보드) =====
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection \; send -X cancel
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection \; send -X cancel

# 더블클릭: 단어 선택 + 복사
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-selection \; send -X cancel
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-selection \; send -X cancel

# 트리플클릭: 라인 선택 + 복사
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-selection \; send -X cancel
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-selection \; send -X cancel

# ===== 키 바인딩 =====
# 설정 리로드
bind r source-file ~/.tmux.conf \; display "설정 리로드 완료!"

# 패널 분할 (직관적인 키)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# 새 창 (현재 경로 유지)
bind c new-window -c "#{pane_current_path}"

# 패널 이동 (vim 스타일)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 패널 크기 조절
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt + 방향키로 패널 이동 (prefix 없이)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Alt+Shift+방향키로 패널 크기 조절
bind -n M-S-Left resize-pane -L 2
bind -n M-S-Right resize-pane -R 2
bind -n M-S-Up resize-pane -U 2
bind -n M-S-Down resize-pane -D 2

# Ctrl+PageUp/Down 윈도우 이동
bind -n C-PageUp previous-window
bind -n C-PageDown next-window

# ===== 복사 모드 (vi 스타일) =====
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ===== 상태바 (Catppuccin 테마) =====
set -g status-position bottom
set -g status-interval 1

set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'
set -g status-justify left

# 왼쪽: 세션명
set -g status-left-length 30
set -g status-left ' #[fg=#cba6f7]#S#[fg=default] '

# 오른쪽: 시스템 모니터 + 날짜/시간
set -g status-right-length 120
set -g status-right '#(~/.local/bin/tmux-sysmon.sh) #[fg=#89dceb]│ #[fg=#a6e3a1]%H:%M:%S #[fg=#89b4fa]%m-%d '

# 창 목록 스타일
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format "#[fg=colour235,bg=colour136] #I:#W #[fg=colour136,bg=colour235]"

# 패널 테두리
set -g pane-border-style fg='#313244'
set -g pane-active-border-style "fg=colour136"

# 메시지 스타일
set -g message-style bg='#cba6f7',fg='#1e1e2e'

# ===== 활동 알림 =====
setw -g monitor-activity on
set -g visual-activity off

# ===== TPM 플러그인 설정 =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# 프리픽스 하이라이트 설정
set -g @prefix_highlight_fg '#1e1e2e'
set -g @prefix_highlight_bg '#cba6f7'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e1e2e,bg=#a6e3a1'

# 상태바에 프리픽스 하이라이트 추가
set -g status-left '#{prefix_highlight} #[fg=#cba6f7]#S#[fg=default] '
set -g status-left-length 40

set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
# TPM 초기화 (파일 마지막에 있어야 함)
run '~/.tmux/plugins/tpm/tpm'
